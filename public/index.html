<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შაშკი ონლაინში (ოთახებით)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #222; color: #fff; margin: 0; padding: 20px; }
        #room-selection { margin-bottom: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 5px; border: none; }
        button { background-color: #4CAF50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #game-container { display: none; justify-content: center; align-items: flex-start; gap: 20px; margin-top: 20px; }
        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 4px solid #333; }
        .cell { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .piece { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .piece.w { background-color: #fff; border: 2px solid #ccc; }
        .piece.b { background-color: #000; border: 2px solid #333; }
        .piece.king { border: 4px double gold !important; }
        .selected { border: 3px solid lime !important; }
        #chat-container { width: 300px; height: 490px; background: #333; display: flex; flex-direction: column; border-radius: 5px; overflow: hidden; }
        #chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; text-align: left; font-size: 14px; }
        #chat-input-container { display: flex; padding: 10px; background: #444; }
        #chat-input { flex-grow: 1; padding: 5px; border-radius: 3px; }
        #turn-indicator { font-size: 20px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>შაშკი ონლაინში 🎲</h1>

    <div id="room-selection">
        <h3>ჩაწერე ოთახის სახელი ან ნომერი შესასვლელად:</h3>
        <input type="text" id="room-id" placeholder="მაგ: 123 ან gio">
        <button onclick="joinRoom()">შესვლა ოთახში</button>
    </div>

    <div id="turn-indicator"></div>

    <div id="game-container">
        <div id="board"></div>
        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="მიწერე ძმაკაცს...">
                <button onclick="sendMessage()">➡️</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let boardState = [];
        let myColor = null; 
        let currentTurn = 'w';
        let selectedPiece = null;
        let roomId = "";

        function joinRoom() {
            const input = document.getElementById('room-id').value.trim();
            if(!input) return alert("ჩაწერე რამე ოთახის ნომერი!");
            roomId = input;
            
            socket.emit('joinRoom', roomId);
            document.getElementById('room-selection').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
        }

        socket.on('initGameState', (gameState) => {
            boardState = gameState.board;
            currentRoomTurn = gameState.turn;
            updateTurnIndicator();
            renderBoard();
        });

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const pieceData = boardState[r][c];
                    if (pieceData) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${pieceData.type} ${pieceData.king ? 'king' : ''}`;
                        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                            piece.classList.add('selected');
                        }
                        piece.onclick = (e) => { e.stopPropagation(); selectPiece(r, c); };
                        cell.appendChild(piece);
                    }
                    cell.onclick = () => movePiece(r, c);
                    boardDiv.appendChild(cell);
                }
            }
        }

        function selectPiece(r, c) {
            const piece = boardState[r][c];
            if (piece && piece.type === currentRoomTurn) {
                selectedPiece = { row: r, col: c };
                renderBoard();
            }
        }

        function movePiece(targetRow, targetCol) {
            if (!selectedPiece) return;
            const piece = boardState[selectedPiece.row][selectedPiece.col];
            
            if ((targetRow + targetCol) % 2 === 0) return;
            if (boardState[targetRow][targetCol] !== null) return;

            const rowDiff = targetRow - selectedPiece.row;
            const colDiff = targetCol - selectedPiece.col;
            const absRowDiff = Math.abs(rowDiff);
            const absColDiff = Math.abs(colDiff);

            let isNormalMove = false;
            let isJumpMove = false;

            if (absRowDiff === 1 && absColDiff === 1) {
                if (piece.king || (piece.type === 'w' && rowDiff === -1) || (piece.type === 'b' && rowDiff === 1)) {
                    isNormalMove = true;
                }
            } else if (absRowDiff === 2 && absColDiff === 2) {
                const midRow = selectedPiece.row + rowDiff / 2;
                const midCol = selectedPiece.col + colDiff / 2;
                const midPiece = boardState[midRow][midCol];
                if (midPiece && midPiece.type !== piece.type) {
                    if (piece.king || (piece.type === 'w' && rowDiff === -2) || (piece.type === 'b' && rowDiff === 2)) {
                        boardState[midRow][midCol] = null; 
                        isJumpMove = true;
                    }
                }
            }

            if (isNormalMove || isJumpMove) {
                boardState[targetRow][targetCol] = piece;
                boardState[selectedPiece.row][selectedPiece.col] = null;

                if (piece.type === 'w' && targetRow === 0) piece.king = true;
                if (piece.type === 'b' && targetRow === 7) piece.king = true;

                currentRoomTurn = currentRoomTurn === 'w' ? 'b' : 'w';
                selectedPiece = null;

                renderBoard();
                updateTurnIndicator();

                socket.emit('move', { board: boardState, turn: currentRoomTurn });
            }
        }

        socket.on('move', (data) => {
            boardState = data.board;
            currentRoomTurn = data.turn;
            updateTurnIndicator();
            renderBoard();
        });

        function updateTurnIndicator() {
            document.getElementById('turn-indicator').innerText = currentRoomTurn === 'w' ? "თეთრების სვლაა ⚪" : "შავების სვლაა ⚫";
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(`შენ: ${text}`);
            socket.emit('chatMessage', text);
            input.value = '';
        }

        socket.on('chatMessage', (msg) => {
            appendMessage(`ოპონენტი: ${msg}`);
        });

        function appendMessage(text) {
            const msgDiv = document.getElementById('chat-messages');
            const p = document.createElement('p');
            p.innerText = text;
            p.style.margin = "5px 0";
            msgDiv.appendChild(p);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
